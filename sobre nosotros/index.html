<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>RF MOONR - Agencia de Marketing Espacial</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
        }
        
        /* Colores Personalizados */
        .bg-space-navy { background-color: #0B1D33; }
        .text-space-navy { color: #0B1D33; }
        .bg-rocket-orange { background-color: #E67E22; }
        .hover-rocket-orange:hover { background-color: #D35400; }
        .border-rocket-orange { border-color: #E67E22; }
        .bg-card-dark { background-color: #0F2540; }

        /* Decoraciones */
        .star-bg {
            background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px);
            background-size: 550px 550px;
        }
        .hero-gradient {
            background: linear-gradient(135deg, #0B1D33 0%, #162C4E 100%);
        }
        .curved-divider {
            border-radius: 0 0 50px 50px;
        }
        
        /* FIX del problema 1 y 2: Appearance estándar */
        input, select, textarea {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none; /* Esta es la propiedad estándar que pedía el error */
        }

        @media (min-width: 1024px) {
            .curved-divider {
                border-radius: 0 0 50% 50% / 0 0 15% 15%;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
</head>

<body class="bg-white text-gray-900 overflow-x-hidden">

<header id="main-header" class="absolute top-0 left-0 right-0 z-50">
    <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <div class="w-10 h-10 bg-rocket-orange rounded-full flex items-center justify-center">
                <span class="text-white font-bold">RF</span>
            </div>
            <span class="text-white font-extrabold text-xl tracking-wider">MOONR</span>
        </div>
        <div class="hidden md:flex space-x-8">
            <a class="text-white hover:text-rocket-orange transition font-medium" href="/">Inicio</a>
            <a class="text-white hover:text-rocket-orange transition font-medium" href="/servicios/">Servicios</a>
            <a class="text-white hover:text-rocket-orange transition font-medium" href="/sobre-nosotros/">Sobre Nosotros</a>
            <a class="text-white hover:text-rocket-orange transition font-medium" href="/contacto/">Contacto</a>
        </div>
    </nav>
</header>

<section class="hero-gradient star-bg pt-28 pb-16 lg:pt-32 lg:pb-20 relative overflow-hidden curved-divider">
    <div class="container mx-auto px-6 flex flex-col lg:flex-row items-center">
        <div class="w-full lg:w-1/2 z-10 text-center lg:text-left">
            <h1 class="text-white text-3xl md:text-5xl lg:text-6xl font-black leading-tight mb-4 lg:mb-6 uppercase">
                ¡Tu marca necesita<br/> un lanzamiento<br/> espacial!
            </h1>
            <p class="text-gray-300 text-base md:text-lg mb-8 max-w-md mx-auto lg:mx-0">
                Marketing digital de vanguardia que te hace brillar. Es hora de despegar hacia el éxito.
            </p>
            
            <div class="bg-white rounded-2xl p-6 md:p-8 shadow-2xl max-w-md mx-auto lg:mx-0">
                <h2 class="text-space-navy font-bold text-base md:text-lg mb-4 uppercase">Solicita tu estrategia gratuita</h2>
                <form name="contacto-hero" method="POST" data-netlify="true" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input class="w-full rounded-lg border-gray-300 focus:ring-rocket-orange focus:border-rocket-orange text-sm p-3" name="nombre" placeholder="Nombre" type="text" required/>
                        <input class="w-full rounded-lg border-gray-300 focus:ring-rocket-orange focus:border-rocket-orange text-sm p-3" name="email" placeholder="Correo" type="email" required/>
                    </div>
                    <input class="w-full rounded-lg border-gray-300 focus:ring-rocket-orange focus:border-rocket-orange text-sm p-3" name="web" placeholder="Tu sitio web (opcional)" type="url"/>
                    <button class="w-full bg-rocket-orange text-white font-bold py-4 rounded-xl hover-rocket-orange transition-all shadow-lg flex items-center justify-center gap-2 text-base" type="submit">
                        ¡LANZA MI CAMPAÑA! 🚀
                    </button>
                </form>
            </div>
        </div>

        <div class="w-full lg:w-1/2 mt-12 lg:mt-0 relative flex justify-center items-center">
            <div class="relative w-full max-w-[280px] md:max-w-lg animate-bounce" style="animation-duration: 4s;">
                <img alt="Astronauta RF MOONR" class="object-contain w-full h-auto" src="https://raw.githubusercontent.com/bryanalex9763-arch/rifx-marketing.github.io/main/images/astronauta.png"/>
            </div>
        </div>
    </div>
</section>

<footer id="main-footer"></footer>

<script>
  function incluirComponente(id, url) {
    fetch(url)
      .then(respuesta => {
        if (respuesta.ok) return respuesta.text();
        throw new Error("No se pudo cargar: " + url);
      })
      .then(html => {
        const el = document.getElementById(id);
        if (el) el.innerHTML = html;
      })
      .catch(err => console.error(err));
  }

  window.addEventListener('DOMContentLoaded', () => {
    // Solo carga si el archivo existe en tu servidor
    incluirComponente('main-header', '/nav.html');
    incluirComponente('main-footer', '/footer-content.html');
  });
</script>

</body>
</html>
