[build]
  publish = "."

[[headers]]
  for = "/admin/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline' https://unpkg.com https://cdn.jsdelivr.net https://identity.netlify.com https://netlify-cdp-proxy.netlify.app; style-src 'self' 'unsafe-inline' https://unpkg.com https://cdn.jsdelivr.net; img-src 'self' data: blob: https:; font-src 'self' data: https:; connect-src 'self' https://api.netlify.com https://*.netlify.com blob:; frame-src 'self'; object-src 'none'"
```

**4.** Guarda con `Ctrl+S`

**5.** Ve al ícono de Git en VS Code (el de la ramita izquierda) → escribe un mensaje como `"agrego netlify.toml"` → clic en **Commit** → luego **Sync/Push**

Debería quedar así en tu explorador:
```
RIFX-MARKETING.GITHUB.IO
├── netlify.toml   ← aquí, al mismo nivel
├── index.html
├── README.md
├── admin/
├── data/
└── ...