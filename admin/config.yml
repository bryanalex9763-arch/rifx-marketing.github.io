backend:
  name: github
  repo: bryanalex9763-arch/rifx-marketing.github.io # CAMBIA ESTO POR TU REPO REAL
  branch: main

media_folder: "images" # Donde se guardarán las fotos que subas
public_folder: "/images"

collections:
  - name: "paginas"
    label: "Páginas"
    files:
      - file: "index.html"
        label: "Inicio"
        name: "index"
        fields:
          - { label: "Título Principal", name: "title", widget: "string" }
          - { label: "Descripción Hero", name: "description", widget: "text" }
          - { label: "Color de Fondo", name: "bg_color", widget: "color" }
