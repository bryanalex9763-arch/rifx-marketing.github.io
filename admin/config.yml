backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"

collections:
  - name: "paginas"
    label: "Páginas"
    files:
      - label: "Inicio"
        name: "index"
        file: "index.html"
        fields:
          - {label: "Título principal", name: "title", widget: "string"}
          - {label: "Texto de bienvenida", name: "body", widget: "text"}
          - {label: "Imagen hero", name: "hero_image", widget: "image"}

  - name: "blog"
    label: "Blog"
    folder: "blog"
    create: true
    fields:
      - {label: "Título", name: "title", widget: "string"}
      - {label: "Fecha", name: "date", widget: "datetime"}
      - {label: "Imagen", name: "thumbnail", widget: "image"}
      - {label: "Contenido", name: "body", widget: "markdown"}