backend:
  name: git-gateway
  repo: bryanalex9763-arch/rifx-marketing.github.io # Asegúrate que sea tu repo
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "paginas"
    label: "Páginas"
    files:
      - file: "index.html"
        label: "Página de Inicio"
        name: "index"
        fields:
          - { label: "Cuerpo de la página (HTML)", name: "body", widget: "markdown" }