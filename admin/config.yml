backend:
  name: git-gateway
  repo: bryanalex9763-arch/rifx-marketing.github.io
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "paginas"
    label: "Paginas"
    files:
      - file: "index.html"
        label: "Inicio"
        name: "index"
        fields:
          - { label: "Titulo", name: "title", widget: "string" }
          - { label: "Descripcion", name: "description", widget: "text" }