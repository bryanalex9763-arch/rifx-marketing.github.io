backend:
  name: git-gateway
  repo: bryanalex9763-arch/rifx-marketing.github.io
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "paginas"
    label: "Páginas"
    files:
      - file: "index.html"
        label: "Inicio"
        name: "indice"
        fields:
          - { label: "Título Principal", name: "title", widget: "string" }
          - { label: "Descripción Hero", name: "description", widget: "text" }
          - { label: "Texto del Botón", name: "btn_text", widget: "string" }