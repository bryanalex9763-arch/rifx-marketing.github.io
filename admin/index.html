<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>RF MOONR - Agencia de Marketing Espacial</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #0b1229; }
        .bg-space-navy { background-color: #0b1229; }
        .bg-rocket-orange { background-color: #F27121; }
        .star-bg { background-image: radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 40px); background-size: 550px 550px; }
        .hero-gradient { background: linear-gradient(135deg, #0b1229 0%, #1a2348 100%); }
    </style>
</head>
<body class="text-white overflow-x-hidden">
    <header class="absolute top-0 left-0 right-0 z-50">
        <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <div class="w-10 h-10 bg-rocket-orange rounded-full flex items-center justify-center font-bold">RF</div>
                <span class="font-extrabold text-xl tracking-wider">MOONR</span>
            </div>
        </nav>
    </header>

    <section class="hero-gradient star-bg min-h-screen flex items-center pt-20">
        <div class="container mx-auto px-6 flex flex-col lg:flex-row items-center">
            <div class="w-full lg:w-1/2 text-center lg:text-left">
                <h1 class="text-4xl md:text-6xl font-black mb-6 leading-tight">¡TU MARCA NECESITA UN LANZAMIENTO ESPACIAL!</h1>
                <p class="text-gray-300 text-lg mb-8">Marketing digital de vanguardia que te hace brillar. Es hora de despegar.</p>
                <button class="bg-rocket-orange px-10 py-4 rounded-xl font-bold hover:scale-105 transition-transform shadow-xl">¡LANZA MI CAMPAÑA! 🚀</button>
            </div>
            <div class="w-full lg:w-1/2 mt-12 lg:mt-0 flex justify-center">
                <img src="https://rifx-marketing.netlify.app/images/astronaut.png" class="w-full max-w-md animate-bounce" style="animation-duration: 4s;">
            </div>
        </div>
    </section>
</body>
</html>
