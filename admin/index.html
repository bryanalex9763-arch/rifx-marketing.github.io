<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>RF MOONR - Agencia de Marketing Espacial</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Montserrat', sans-serif; }
        .bg-space-navy { background-color: #0b1229; }
        .bg-rocket-orange { background-color: #F27121; }
        .star-bg { background-image: radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 40px); background-size: 550px 550px; }
        .hero-gradient { background: linear-gradient(135deg, #0b1229 0%, #1a2348 100%); }
    </style>
</head>
<body class="bg-white text-gray-900 overflow-x-hidden">

<header class="absolute top-0 left-0 right-0 z-50">
    <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <div class="w-10 h-10 bg-rocket-orange rounded-full flex items-center justify-center">
                <span class="text-white font-bold">RF</span>
            </div>
            <span class="text-white font-extrabold text-xl tracking-wider uppercase">Moonr</span>
        </div>
    </nav>
</header>

<section class="hero-gradient star-bg pt-28 pb-16 relative overflow-hidden h-screen flex items-center">
    <div class="container mx-auto px-6 flex flex-col lg:flex-row items-center">
        <div class="w-full lg:w-1/2 z-10 text-center lg:text-left">
            <h1 class="text-white text-3xl md:text-5xl lg:text-6xl font-black leading-tight mb-6 uppercase">
                ¡Tu marca necesita un lanzamiento espacial!
            </h1>
            <p class="text-gray-300 text-base md:text-lg mb-8 max-w-md mx-auto lg:mx-0">
                Marketing digital de vanguardia que te hace brillar. Es hora de despegar.
            </p>
            <div class="max-w-md mx-auto lg:mx-0">
                <button class="bg-rocket-orange text-white font-bold py-4 px-10 rounded-xl shadow-lg hover:scale-105 transition-transform">
                    ¡LANZA MI CAMPAÑA! 🚀
                </button>
            </div>
        </div>
        <div class="w-full lg:w-1/2 mt-12 lg:mt-0 flex justify-center">
            <img src="https://rifx-marketing.netlify.app/images/astronaut.png" class="w-full max-w-sm animate-bounce" style="animation-duration: 4s;" alt="Astronauta">
        </div>
    </div>
</section>

</body>
</html>
