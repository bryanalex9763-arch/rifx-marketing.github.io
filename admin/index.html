<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
    body { font-family: 'Montserrat', sans-serif; }
    .bg-space-navy { background-color: #0b1229; }
    .bg-rocket-orange { background-color: #F27121; }
    .star-bg { background-image: radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 40px); background-size: 550px 550px; }
    .hero-gradient { background: linear-gradient(135deg, #0b1229 0%, #1a2348 100%); }

            <h1 class="text-white text-3xl md:text-5xl lg:text-6xl font-black leading-tight mb-6">
                {{title}}
            </h1>
            <p class="text-gray-300 text-base md:text-lg mb-8 max-w-md mx-auto lg:mx-0">
                {{description}}

            <div class="bg-white rounded-2xl p-8 shadow-2xl max-w-md mx-auto lg:mx-0">
